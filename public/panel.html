<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ImageAI — Panel</title>
  <link rel="stylesheet" href="panel.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- =============================================
       LAYOUT PRINCIPAL: sidebar + main
       ============================================= -->
  <div class="app-layout">

    <!-- ==========================================
         SIDEBAR IZQUIERDO — historial de prompts
         ========================================== -->
    <aside class="sidebar">

      <!-- Logo arriba -->
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="3" fill="#FF0090"/>
            <rect x="18" y="2" width="12" height="12" rx="3" fill="#FF0090" opacity="0.5"/>
            <rect x="2" y="18" width="12" height="12" rx="3" fill="#FF0090" opacity="0.5"/>
            <rect x="18" y="18" width="12" height="12" rx="3" fill="#FF0090"/>
          </svg>
          <span class="logo-text">ImageAI</span>
        </div>
      </div>

      <!-- Título del historial + botón limpiar todo -->
      <div class="sidebar-section-header">
        <span class="sidebar-section-title">Historial</span>
        <!-- Botón para borrar todos los prompts -->
        <button class="btn-clear-all" id="btnClearAll" title="Limpiar historial">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
          Limpiar todo
        </button>
      </div>

      <!-- Lista de prompts — se genera dinámicamente desde JS -->
      <ul class="prompt-list" id="promptList">
        <!-- Cada item se inyecta con JavaScript -->
      </ul>

      <!-- Estado vacío — visible cuando no hay prompts -->
      <div class="empty-state" id="emptyState">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
          <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/>
        </svg>
        <p>Todavía no generaste ninguna imagen</p>
      </div>

      <!-- Footer del sidebar: email del usuario + cerrar sesión -->
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">?</div>
          <span class="user-email" id="userEmail">cargando...</span>
        </div>
        <button class="btn-logout" id="btnLogout" title="Cerrar sesión">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

    </aside>


    <!-- ==========================================
         ÁREA PRINCIPAL — generador de imágenes
         ========================================== -->
    <main class="main-panel">

      <!-- Header del panel principal -->
      <header class="main-header">
        <h1 class="main-title">Generador de Imágenes</h1>
        <p class="main-subtitle">Describí lo que querés ver y la IA lo creará</p>
      </header>

      <!-- ── ZONA DE IMAGEN ─────────────────────────
           Muestra el estado inicial, loading, o la imagen.
           La imagen NO persiste al recargar la página.
           ──────────────────────────────────────────── -->
      <div class="image-zone" id="imageZone">

        <!-- Estado inicial — visible antes de generar -->
        <div class="image-placeholder" id="imagePlaceholder">
          <div class="placeholder-glow"></div>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p class="placeholder-text">Tu imagen aparecerá aquí</p>
          <p class="placeholder-hint">Escribí un prompt abajo y presioná Generar</p>
        </div>

        <!-- Loading — visible mientras OpenAI procesa -->
        <div class="image-loading hidden" id="imageLoading">
          <div class="spinner-large"></div>
          <p class="loading-label">Generando imagen...</p>
          <p class="loading-hint">Esto puede tardar hasta 15 segundos</p>
        </div>

        <!-- Imagen generada — visible tras recibir respuesta -->
        <div class="image-result hidden" id="imageResult">
          <img src="" alt="Imagen generada" class="generated-image" id="generatedImage"/>
          <!-- Prompt usado — se muestra debajo de la imagen -->
          <p class="image-caption" id="imageCaption"></p>
        </div>

      </div>

      <!-- ── INPUT DE PROMPT ────────────────────────
           El usuario escribe aquí su descripción.
           Al enviar: llama a POST /generate en el backend.
           ──────────────────────────────────────────── -->
      <div class="prompt-input-area">
        <div class="prompt-input-wrapper">
          <textarea
            id="promptInput"
            class="prompt-textarea"
            placeholder="Describí la imagen que querés generar... Ej: Un gato astronauta flotando en el espacio con una guitarra eléctrica"
            rows="3"
            maxlength="1000"
          ></textarea>
          <div class="prompt-input-footer">
            <!-- Contador de caracteres -->
            <span class="char-count" id="charCount">0 / 1000</span>
            <!-- Botón principal de generación -->
            <button class="btn-generate" id="btnGenerate">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
              Generar
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast de notificaciones (igual que en index.html) -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon"></span>
    <span class="toast-msg"  id="toastMsg"></span>
  </div>

  <script src="panel.js"></script>
</body>
</html>
